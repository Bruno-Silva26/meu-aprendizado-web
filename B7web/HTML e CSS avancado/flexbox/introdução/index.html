<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            height: 900px;
            background-color: #ccc;
            flex-flow: row wrap ;
            justify-content: center;
            align-items: center;
            
        }
        /*
        justify-content alinha de acordo com a direção.

        Já o align-items alinha na direção contrária da direção
        */

        .container div {
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 10px;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;

        }
        .container div:active {
            background-color: green;
            align-self: flex-end;
        }

        .div10{
            order: -1;
        }

    </style>
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div class="div10">10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>
        <div class="div14">14</div>
        <div class="div15">15</div>
    </div>    
</body>
</html>
