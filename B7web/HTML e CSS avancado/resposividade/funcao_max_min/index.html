<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        img {
            width: max(50%, 300px);
            
            /* a Max voce escolhe a maior medida para ser sua largura. E temos a Min que pega a menor para ser sua largura*/

            object-fit: cover;
        }
   
    </style>
</head>
<body>

   <img src="https://www.google.com.br/google.jpg" alt="">
