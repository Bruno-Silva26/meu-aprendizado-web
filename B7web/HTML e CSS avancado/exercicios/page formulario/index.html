<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page formulario</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header></header>
    <section>
        <div class="container">
            <form  class="formulario" method="get">

                <div class="card1">
                    <label for="nome">
                        <span>nome completo</span>
                        <input type="text" id="nome" name="nome" class="nome" placeholder="Nome Completo"
                            autofocus required>
                    </label>

                    <label for="RG">
                        <span>RG</span>
                        <input type="text" id="RG" name="RG" placeholder="00.000.000-0" required>
                    </label>

                    <label for="pai">
                        <span>pai:</span>
                        <input type="text" class="nome" id="pai" name="pai" placeholder="Nome do pai">
                    </label>

                    <label for="escolaridade">
                        <span>escolaridade</span>
                        <select name="escolaridade" id="escolaridade">
                            <option value="">selecione</option>
                            <option value="fundamental">fundamental</option>
                            <option value="ensino medio">ensino médio</option>
                            <option value="superior">superior</option>
                            <option value="pos">Pós</option>
                        </select>
                    </label>

                    <label for="telefone">
                        <span>telefone:</span>
                        <input type="text" id="telefone" name="telefone" placeholder="0000-0000">
                    </label>

                    <label for="email">
                        <span>e-mail</span>
                        <input type="email" id="email" name="email" placeholder="exemplo@gmail.com">
                    </label>
                </div>

                <div class="card2">
                    <label for="nascimento">
                        <span>data de nascimento</span>
                        <input type="date" id="nascimento" required name="data_nascimento">
                    </label>

                    <label for="cpf">
                        <span>CPF</span>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required autocomplete="on">
                    </label>

                    <label for="mae">
                        <span>mãe</span>
                        <input type="text" id="mae" name="mae" class="nome" placeholder="nome da mãe">
                    </label>

                    <label for="profissao">
                        <span>profissão</span>
                        <input type="text" id="profissao" name="profissao" placeholder="profissão">
                    </label>

                    <label for="celular">
                        <span>celular</span>
                        <input type="text" id="celular" name="celular" placeholder="(00)0000-0000" required>
                    </label>
                </div>

                <div class="submit">
                    <input type="submit" value="Cadastrar">
                    <input type="reset" value="Limpar campos">
                </div>

            </form>
        </div>
    </section>
</body>

</html>
