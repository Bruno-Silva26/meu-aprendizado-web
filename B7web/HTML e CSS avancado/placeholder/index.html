<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;           /* body ocupa a tela toda */
            display: flex;
            margin: 0;
}
        .container {
            background-color: #6b6b6b;
            margin: auto;
            padding: 30px;
            width: 300px;
            height: 300px;
            text-align: justify;
            border-radius: 20px;
            box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.459);
            transition-duration: 0.4s;
        }
        .container:hover{
            background-color: purple;
            padding:50px ;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.459);
        }
        .container p {
            font-family: 'Courier New', Courier, monospace;
            background-color: aliceblue;
            width:70px;
            padding: 10px;
            font-weight: bolder;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.493);
            text-align: center;
            transition-duration: 0.4s;
            border-radius: 4%;
        }
        .container input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.678);
            transition-duration: 0.6s;
        }
        .container input:hover {
            padding: 15px;
        }

        .container input::placeholder {
            color:rgb(8, 46, 8);
        }

        .container p:hover {
            background-color: rgb(8, 46, 8);
            color: #fff;
        }
    </style>
</head>
<body>

    <form class="container" method="get">
        <p>Usuario:</p>
        <input type="text" name="Usuario" placeholder="Usuario" autofocus autocomplete="on" >
        <p>Senha:</p>
        <input type="password" name="senha" placeholder="Senha" maxlength="2" required>

        <input type="submit" value="Enviar">
    </form>


    
</body>
</html>
