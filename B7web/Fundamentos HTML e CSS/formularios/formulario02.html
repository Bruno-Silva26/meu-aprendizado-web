<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario 02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formularios</h1>
    <div class="candidato">
            <h2>Area de cadastro</h2>
    </div>

    <form action="../aula 01.html" method="get">

        <label>
            Nome completo: <br>
            <input type="text" name="nome do usuario">
        </label>

        <label >
            Email: <br>
            <input type="email" name="email do usuario">
        </label>

        <label>
            categorias: <br>
            <select name="categoria">
                <option value="1">categoria 1</option>
                <option value="2">categoria 2</option>
                <option value="3">categoria 3</option>
                <option value="4">categoria 4</option>
                <option value="5">categoria 5</option>

            </select>
        </label>


        <label >
            descricao: <br>
            <textarea name="descricao" ></textarea>
        </label>
        <label>
            <input type="checkbox">
            Eu declaro que li e aceito os<a href="#" target="_blank"> termos de uso</a>
        </label>

        <button>Fazer cadastro</button>

    </form>
    
</body>
</html>
