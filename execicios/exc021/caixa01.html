<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: lightgreen;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: red;

            border: 10px solid red ;

            padding:10px 10px 10px 10px ;

            margin: auto auto 40px auto ; /* alinhar com o meio a caixa */
            outline: 10px dashed green
        }
        a{
            border-width: 10px;
            border-style: solid;
            border-color: blueviolet;
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

        }
    </style>
</head>
<body>
    <h1>exemplos de caixa box-level</h1>
    <p>paragrafos sao caixa box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> vamos ve como tudo isso funciona </p>
</body>
</html>
