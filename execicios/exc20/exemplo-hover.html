<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        div:hover {
            color: rgb(255, 0, 0);
        }



        div > p {
            display: none;
        }


        h1:hover ~ div{
            display: none;
        }
    </style>


</head>
<body>
    <h1>exemplo de houver</h1>
    <p>passe o mouse sobre o texto</p>
    <div>
        passe o mouse aqui
        <p>TEXTO ESCONDIDO</p>
    </div>
</body>
</html>
