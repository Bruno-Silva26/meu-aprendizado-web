<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>


    <style>
        /*
        SELETORES PERSONALIZADOS:
        
        #   = id
        .   = classes
        :   = pseudo-class
        ::  = pseudo-element
        >   = clildren
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkblue;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: yellow;
        }

        .especial::before{
            content: '→';
        }


        .especial::after{
            content: '←';
            text-decoration: none;
            font-weight: normal;
            color: green
        }
    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
    <li><a href="https://github.com/Bruno-Silva26" target="_blank">repositorio git hub</a></li>
    <li><a href="https://www.linkedin.com/in/brunorodrigues26/" class="especial">linkedin</a></li>        
    <li><a href="https://www.cursoemvideo.com/">site do cursoemvideo</a></li>

</ul>
    
</body>
</html>
